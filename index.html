<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>Mausam Typing Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
    color: #e2e8f0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .app {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
    gap: 16px;
  }

  /* Top nav */
  .top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .nav-title {
    font-size: 1.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .nav-buttons {
    display: flex;
    gap: 8px;
  }
  .nav-btn {
    padding: 8px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #e2e8f0;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
  }
  .nav-btn.active {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-color: #a78bfa;
  }

  /* Stats bar */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }
  .stat .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #94a3b8;
    margin-bottom: 4px;
  }
  .stat .value {
    font-size: 1.1rem;
    font-weight: 700;
    color: #f8fafc;
  }
  .stat .value.accent { color: #a78bfa; }
  .stat .value.good { color: #34d399; }
  .stat .value.warn { color: #fbbf24; }

  /* Game view */
  .game-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 16px;
  }
  .game-view.hidden { display: none; }

  /* Word display area */
  .word-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .source-tag {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 0.7rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .word-display {
    font-size: clamp(2rem, 9vw, 4rem);
    font-weight: 800;
    letter-spacing: 0.05em;
    text-align: center;
    word-break: break-word;
    line-height: 1.1;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .char {
    display: inline-block;
    transition: color 0.1s, transform 0.1s;
    color: #475569;
  }
  .char.correct {
    color: #34d399;
  }
  .char.current {
    color: #f8fafc;
    border-bottom: 3px solid #a78bfa;
    animation: blink 1s infinite;
  }
  .char.wrong {
    color: #f87171;
    animation: shake 0.2s;
  }

  @keyframes blink {
    50% { border-bottom-color: transparent; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); opacity: 0.5; }
    100% { transform: scale(0.9); opacity: 0; }
  }
  .word-display.completed { animation: pop 0.35s forwards; }

  .hint {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #94a3b8;
    text-align: center;
  }

  /* Input */
  .input-area {
    position: relative;
  }
  #typeInput {
    width: 100%;
    padding: 16px 18px;
    font-size: 1.1rem;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(167,139,250,0.4);
    border-radius: 14px;
    color: #f8fafc;
    outline: none;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, background 0.2s;
  }
  #typeInput:focus {
    border-color: #a78bfa;
    background: rgba(255,255,255,0.12);
  }
  #typeInput::placeholder {
    color: #64748b;
  }

  /* Buttons */
  .controls {
    display: flex;
    gap: 10px;
  }
  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    color: #f8fafc;
  }
  button:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* Loader */
  .loader {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(167,139,250,0.3);
    border-top-color: #a78bfa;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Leaderboard view */
  .leaderboard-view {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 16px;
    overflow: hidden;
  }
  .leaderboard-view.hidden { display: none; }

  .leaderboard-container {
    display: flex;
    flex-direction: column;
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    overflow: hidden;
  }

  .leaderboard-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 16px;
    color: #f8fafc;
  }

  .leaderboard-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
  }
  .leaderboard-list::-webkit-scrollbar {
    width: 6px;
  }
  .leaderboard-list::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
  }
  .leaderboard-list::-webkit-scrollbar-thumb {
    background: rgba(167,139,250,0.4);
    border-radius: 10px;
  }
  .leaderboard-list::-webkit-scrollbar-thumb:hover {
    background: rgba(167,139,250,0.6);
  }

  .leaderboard-entry {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 12px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px;
    animation: slideIn 0.4s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .rank {
    font-weight: 800;
    font-size: 1.2rem;
    width: 32px;
    text-align: center;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .rank.gold {
    font-size: 1.4rem;
  }

  .entry-name {
    font-weight: 600;
    color: #f8fafc;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .entry-wpm {
    font-weight: 700;
    color: #a78bfa;
    font-size: 1.1rem;
    min-width: 50px;
    text-align: right;
  }

  .entry-medal {
    font-size: 1.2rem;
    width: 24px;
    text-align: center;
  }

  .empty-leaderboard {
    text-align: center;
    padding: 40px 20px;
    color: #94a3b8;
  }
  .empty-leaderboard p {
    font-size: 0.95rem;
    margin-bottom: 8px;
  }

  .leaderboard-actions {
    display: flex;
    gap: 10px;
  }

  /* Game over screen */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.active { display: flex; }
  .modal {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .modal h2 {
    font-size: 1.6rem;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .modal-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 20px 0;
  }
  .modal-stat {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 12px;
  }
  .modal-stat .label {
    font-size: 0.7rem;
    color: #94a3b8;
    text-transform: uppercase;
  }
  .modal-stat .value {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 4px;
  }

  /* Name input modal */
  .name-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.92);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 101;
    padding: 20px;
  }
  .name-modal-overlay.active { display: flex; }
  .name-modal {
    background: linear-gradient(135deg, #1e1b4b, #312e81);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 28px;
    max-width: 320px;
    width: 100%;
  }
  .name-modal h3 {
    font-size: 1.3rem;
    margin-bottom: 16px;
    color: #f8fafc;
  }
  .name-modal input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(167,139,250,0.4);
    border-radius: 10px;
    color: #f8fafc;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .name-modal input:focus {
    border-color: #a78bfa;
    background: rgba(255,255,255,0.12);
  }
  .name-modal-buttons {
    display: flex;
    gap: 10px;
  }
  .name-modal-buttons button {
    flex: 1;
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .app { padding: 10px; gap: 10px; }
    .stat .value { font-size: 1rem; }
    .stat .label { font-size: 0.6rem; }
    .nav-title { font-size: 1.1rem; }
  }
  @media (max-height: 600px) {
    .word-area { min-height: 140px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="top-nav">
      <div class="nav-title">⚡ Mausam</div>
      <div class="nav-buttons">
        <button class="nav-btn active" id="gameNavBtn">Game</button>
        <button class="nav-btn" id="leaderboardNavBtn">🏆 Board</button>
      </div>
    </div>

    <!-- GAME VIEW -->
    <div class="game-view" id="gameView">
      <div class="stats">
        <div class="stat">
          <div class="label">Time</div>
          <div class="value warn" id="timeStat">60</div>
        </div>
        <div class="stat">
          <div class="label">Score</div>
          <div class="value accent" id="scoreStat">0</div>
        </div>
        <div class="stat">
          <div class="label">WPM</div>
          <div class="value good" id="wpmStat">0</div>
        </div>
        <div class="stat">
          <div class="label">Acc</div>
          <div class="value" id="accStat">100%</div>
        </div>
      </div>

      <div class="word-area">
        <div class="source-tag" id="sourceTag">Wikipedia</div>
        <div class="word-display" id="wordDisplay">
          <span class="loader"></span>
        </div>
        <div class="hint" id="hint">Loading words from Wikipedia…</div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="typeInput"
          placeholder="Type the word here…"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="text"
          disabled
        />
      </div>

      <div class="controls">
        <button class="btn-secondary" id="skipBtn">Skip</button>
        <button class="btn-primary" id="restartBtn">Restart</button>
      </div>
    </div>

    <!-- LEADERBOARD VIEW -->
    <div class="leaderboard-view hidden" id="leaderboardView">
      <div class="leaderboard-container">
        <div class="leaderboard-title">🏆 Top Typists</div>
        <div class="leaderboard-list" id="leaderboardList">
          <div class="empty-leaderboard">
            <p>No scores yet. Start typing!</p>
          </div>
        </div>
      </div>
      <div class="leaderboard-actions">
        <button class="btn-secondary" id="clearLeaderboardBtn">Clear Board</button>
        <button class="btn-primary" id="backToGameBtn">Back</button>
      </div>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>⏱️ Time's Up!</h2>
      <div class="modal-stats">
        <div class="modal-stat">
          <div class="label">Score</div>
          <div class="value" id="finalScore">0</div>
        </div>
        <div class="modal-stat">
          <div class="label">Words</div>
          <div class="value" id="finalWords">0</div>
        </div>
        <div class="modal-stat">
          <div class="label">WPM</div>
          <div class="value" id="finalWpm">0</div>
        </div>
        <div class="modal-stat">
          <div class="label">Accuracy</div>
          <div class="value" id="finalAcc">0%</div>
        </div>
      </div>
      <button class="btn-primary" id="playAgainBtn">Save & Play Again</button>
    </div>
  </div>

  <!-- Name Input Modal -->
  <div class="name-modal-overlay" id="nameModalOverlay">
    <div class="name-modal">
      <h3>✨ Save Your Score</h3>
      <input
        type="text"
        id="playerNameInput"
        placeholder="Enter your name…"
        maxlength="20"
        autocomplete="off"
      />
      <div class="name-modal-buttons">
        <button class="btn-secondary" id="skipNameBtn">Skip</button>
        <button class="btn-primary" id="submitNameBtn">Save</button>
      </div>
    </div>
  </div>

<script>
(() => {
  // ========= Config =========
  const GAME_DURATION = 60;
  const MIN_WORD_LEN = 3;
  const MAX_WORD_LEN = 12;
  const LEADERBOARD_KEY = "mausam_leaderboard";
  const MAX_ENTRIES = 50;

  // ========= State =========
  let wordQueue = [];
  let currentWord = "";
  let typedSoFar = "";
  let score = 0;
  let wordsCompleted = 0;
  let totalKeystrokes = 0;
  let correctKeystrokes = 0;
  let timeLeft = GAME_DURATION;
  let timerId = null;
  let gameRunning = false;
  let fetchingMore = false;
  let lastGameStats = null;

  // ========= DOM =========
  const gameView = document.getElementById("gameView");
  const leaderboardView = document.getElementById("leaderboardView");
  const gameNavBtn = document.getElementById("gameNavBtn");
  const leaderboardNavBtn = document.getElementById("leaderboardNavBtn");
  const wordDisplay = document.getElementById("wordDisplay");
  const input = document.getElementById("typeInput");
  const timeStat = document.getElementById("timeStat");
  const scoreStat = document.getElementById("scoreStat");
  const wpmStat = document.getElementById("wpmStat");
  const accStat = document.getElementById("accStat");
  const hint = document.getElementById("hint");
  const skipBtn = document.getElementById("skipBtn");
  const restartBtn = document.getElementById("restartBtn");
  const overlay = document.getElementById("overlay");
  const playAgainBtn = document.getElementById("playAgainBtn");
  const nameModalOverlay = document.getElementById("nameModalOverlay");
  const playerNameInput = document.getElementById("playerNameInput");
  const submitNameBtn = document.getElementById("submitNameBtn");
  const skipNameBtn = document.getElementById("skipNameBtn");
  const leaderboardList = document.getElementById("leaderboardList");
  const clearLeaderboardBtn = document.getElementById("clearLeaderboardBtn");
  const backToGameBtn = document.getElementById("backToGameBtn");

  // ========= Leaderboard Storage =========
  function loadLeaderboard() {
    try {
      const data = localStorage.getItem(LEADERBOARD_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) {
      console.warn("Failed to load leaderboard:", e);
      return [];
    }
  }

  function saveLeaderboard(entries) {
    try {
      localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(entries));
    } catch (e) {
      console.warn("Failed to save leaderboard:", e);
    }
  }

  function addScoreToLeaderboard(name, wpm, score, accuracy) {
    const entries = loadLeaderboard();
    entries.push({
      name: (name || "Anonymous").trim().slice(0, 20),
      wpm: Math.round(wpm),
      score: score,
      accuracy: accuracy,
      timestamp: Date.now()
    });
    // Sort by WPM descending, keep top entries
    entries.sort((a, b) => b.wpm - a.wpm);
    entries.splice(MAX_ENTRIES);
    saveLeaderboard(entries);
  }

  function renderLeaderboard() {
    const entries = loadLeaderboard();
    if (entries.length === 0) {
      leaderboardList.innerHTML = `
        <div class="empty-leaderboard">
          <p>No scores yet. Complete a game to appear here!</p>
        </div>
      `;
      return;
    }

    leaderboardList.innerHTML = entries.map((entry, idx) => {
      const rank = idx + 1;
      let medal = "";
      if (rank === 1) medal = "🥇";
      else if (rank === 2) medal = "🥈";
      else if (rank === 3) medal = "🥉";

      return `
        <div class="leaderboard-entry">
          <div class="rank ${rank <= 3 ? 'gold' : ''}">#${rank}</div>
          <div class="entry-name">${entry.name}</div>
          <div class="entry-wpm">${entry.wpm}</div>
          <div class="entry-medal">${medal}</div>
        </div>
      `;
    }).join("");
  }

  // ========= Navigation =========
  function switchToGame() {
    gameView.classList.remove("hidden");
    leaderboardView.classList.add("hidden");
    gameNavBtn.classList.add("active");
    leaderboardNavBtn.classList.remove("active");
    if (gameRunning) input.focus();
  }

  function switchToLeaderboard() {
    gameView.classList.add("hidden");
    leaderboardView.classList.remove("hidden");
    gameNavBtn.classList.remove("active");
    leaderboardNavBtn.classList.add("active");
    renderLeaderboard();
  }

  gameNavBtn.addEventListener("click", switchToGame);
  leaderboardNavBtn.addEventListener("click", switchToLeaderboard);
  backToGameBtn.addEventListener("click", switchToGame);
  clearLeaderboardBtn.addEventListener("click", () => {
    if (confirm("Clear all leaderboard entries?")) {
      saveLeaderboard([]);
      renderLeaderboard();
    }
  });

  // ========= Wikipedia fetcher =========
  async function fetchWordsFromWikipedia(batchSize = 5) {
    const url =
      "https://en.wikipedia.org/w/api.php?" +
      new URLSearchParams({
        action: "query",
        format: "json",
        generator: "random",
        grnnamespace: "0",
        grnlimit: String(batchSize),
        prop: "extracts",
        explaintext: "1",
        exintro: "1",
        origin: "*"
      });

    const resp = await fetch(url);
    if (!resp.ok) throw new Error("Wikipedia fetch failed");
    const data = await resp.json();
    const pages = (data.query && data.query.pages) || {};
    const collected = [];

    for (const id in pages) {
      const extract = pages[id].extract || pages[id].title || "";
      const tokens = extract
        .replace(/\([^)]*\)/g, " ")
        .split(/[\s\u00A0]+/)
        .map(t => t.replace(/[^A-Za-z'-]/g, "").toLowerCase())
        .filter(t =>
          t.length >= MIN_WORD_LEN &&
          t.length <= MAX_WORD_LEN &&
          /^[a-z][a-z'-]*[a-z]$/.test(t)
        );
      collected.push(...tokens);
    }

    const unique = [...new Set(collected)];
    for (let i = unique.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [unique[i], unique[j]] = [unique[j], unique[i]];
    }
    return unique;
  }

  async function ensureWords() {
    if (wordQueue.length > 8 || fetchingMore) return;
    fetchingMore = true;
    try {
      const words = await fetchWordsFromWikipedia(5);
      wordQueue.push(...words);
    } catch (e) {
      console.warn("Wikipedia fetch failed, using fallback:", e);
      wordQueue.push(
        "wikipedia","article","random","encyclopedia","language",
        "history","science","computer","keyboard","practice",
        "typing","challenge","journey","mountain","planet",
        "satellite","library","education","function","variable"
      );
    } finally {
      fetchingMore = false;
    }
  }

  // ========= Game loop =========
  function renderWord() {
    if (!currentWord) {
      wordDisplay.innerHTML = '<span class="loader"></span>';
      return;
    }
    let html = "";
    for (let i = 0; i < currentWord.length; i++) {
      const c = currentWord[i];
      let cls = "char";
      if (i < typedSoFar.length) {
        cls += typedSoFar[i] === c ? " correct" : " wrong";
      } else if (i === typedSoFar.length) {
        cls += " current";
      }
      html += `<span class="${cls}">${c}</span>`;
    }
    wordDisplay.innerHTML = html;
  }

  async function nextWord() {
    typedSoFar = "";
    input.value = "";
    await ensureWords();
    if (wordQueue.length === 0) {
      setTimeout(nextWord, 300);
      return;
    }
    currentWord = wordQueue.shift();
    wordDisplay.classList.remove("completed");
    renderWord();
    if (wordQueue.length < 8) ensureWords();
  }

  function onWordCompleted() {
    score += currentWord.length;
    wordsCompleted += 1;
    scoreStat.textContent = score;
    wordDisplay.classList.add("completed");
    setTimeout(nextWord, 180);
  }

  function updateAccuracy() {
    const acc = totalKeystrokes === 0
      ? 100
      : Math.round((correctKeystrokes / totalKeystrokes) * 100);
    accStat.textContent = acc + "%";
  }

  function updateWPM() {
    const elapsedMin = (GAME_DURATION - timeLeft) / 60;
    const wpm = elapsedMin > 0 ? Math.round((score / 5) / elapsedMin) : 0;
    wpmStat.textContent = wpm;
  }

  function tick() {
    timeLeft -= 1;
    timeStat.textContent = timeLeft;
    if (timeLeft > 10) {
      timeStat.style.color = "";
    } else {
      timeStat.style.color = "#f87171";
    }
    updateWPM();
    if (timeLeft <= 0) endGame();
  }

  function endGame() {
    gameRunning = false;
    clearInterval(timerId);
    input.disabled = true;

    const finalWpm = parseInt(wpmStat.textContent) || 0;
    const finalAcc = accStat.textContent;
    const finalScore = score;
    const finalWords = wordsCompleted;

    document.getElementById("finalScore").textContent = finalScore;
    document.getElementById("finalWords").textContent = finalWords;
    document.getElementById("finalWpm").textContent = finalWpm;
    document.getElementById("finalAcc").textContent = finalAcc;

    lastGameStats = { wpm: finalWpm, score: finalScore, accuracy: finalAcc };
    overlay.classList.add("active");
  }

  async function startGame() {
    overlay.classList.remove("active");
    nameModalOverlay.classList.remove("active");
    score = 0;
    wordsCompleted = 0;
    totalKeystrokes = 0;
    correctKeystrokes = 0;
    timeLeft = GAME_DURATION;
    wordQueue = [];
    currentWord = "";
    typedSoFar = "";
    scoreStat.textContent = 0;
    wpmStat.textContent = 0;
    accStat.textContent = "100%";
    timeStat.textContent = timeLeft;
    timeStat.style.color = "";
    hint.textContent = "Loading words from Wikipedia…";
    input.disabled = true;
    input.value = "";
    lastGameStats = null;

    await ensureWords();
    await nextWord();

    hint.textContent = "Type each word and press space, or just keep typing.";
    input.disabled = false;
    input.focus();
    gameRunning = true;
    clearInterval(timerId);
    timerId = setInterval(tick, 1000);
    switchToGame();
  }

  // ========= Input handling =========
  input.addEventListener("input", (e) => {
    if (!gameRunning || !currentWord) return;
    let val = input.value;

    if (val.endsWith(" ")) {
      const trimmed = val.trim();
      if (trimmed === currentWord) {
        onWordCompleted();
      } else {
        typedSoFar = trimmed;
        input.value = trimmed;
        renderWord();
      }
      return;
    }

    if (val.length > typedSoFar.length) {
      const newChar = val[val.length - 1];
      const expected = currentWord[val.length - 1];
      totalKeystrokes++;
      if (newChar === expected) correctKeystrokes++;
      updateAccuracy();
    }

    typedSoFar = val;
    renderWord();

    if (typedSoFar === currentWord) {
      onWordCompleted();
    }
    if (typedSoFar.length > currentWord.length) {
      typedSoFar = typedSoFar.slice(0, currentWord.length);
      input.value = typedSoFar;
      renderWord();
    }
  });

  input.addEventListener("blur", () => {
    if (gameRunning) setTimeout(() => input.focus(), 50);
  });

  skipBtn.addEventListener("click", () => {
    if (!gameRunning) return;
    nextWord();
    input.focus();
  });

  restartBtn.addEventListener("click", () => startGame());

  // Name submission
  playAgainBtn.addEventListener("click", () => {
    playerNameInput.value = "";
    playerNameInput.focus();
    nameModalOverlay.classList.add("active");
  });

  submitNameBtn.addEventListener("click", () => {
    const name = playerNameInput.value.trim() || "Anonymous";
    if (lastGameStats) {
      addScoreToLeaderboard(name, lastGameStats.wpm, lastGameStats.score, lastGameStats.accuracy);
    }
    startGame();
  });

  skipNameBtn.addEventListener("click", () => {
    startGame();
  });

  playerNameInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") submitNameBtn.click();
  });

  document.querySelector(".word-area").addEventListener("click", () => {
    if (gameRunning) input.focus();
  });

  // ========= Boot =========
  startGame();
})();
</script>
</body>
</html>
